<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB A+ Prediction Engine</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --txt:#e8eaed; --mut:#9aa0aa;
    --call:#2ea043; --accent:#2ea043; --warn:#e0b070;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;padding:16px;max-width:760px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  h1{font-size:1.4rem;margin:.2em 0}
  .sub{color:var(--mut);font-size:.85rem}
  .fresh{font-size:.8rem;padding:4px 10px;border-radius:6px;background:#13251a;border:1px solid #1e3a28}
  .fresh.stale{background:#2a1e13;border-color:#3a2a1e;color:var(--warn)}
  .toggle{cursor:pointer;background:var(--card);border:1px solid var(--line);color:var(--txt);
    border-radius:6px;padding:6px 12px;font-size:.85rem}
  .banner{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px;margin:14px 0;text-align:center}
  .track{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:14px 0}
  .track .big{font-size:1.8rem;font-weight:700;color:var(--accent)}
  .track .n{color:var(--mut);font-size:.85rem}
  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .kpi .n{font-size:1.6rem;font-weight:700;color:var(--accent)}
  .kpi .n small{font-size:.9rem;font-weight:600}
  .kpi .l{color:var(--mut);font-size:.78rem;margin-top:4px;line-height:1.4}
  .call{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0;
    border-inline-start:3px solid var(--call)}
  .call.silent{opacity:.6;border-inline-start-color:var(--line)}  /* שתיקה: מעומעם אך קריא; A+ נשאר בולט */
  .silent-tag{color:var(--mut);font-style:italic}
  .ctop{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .teams{font-weight:600}
  .pick{font-size:.8rem;padding:3px 9px;border-radius:20px;background:#13251a;color:#4ade80;border:1px solid #1e3a28;white-space:nowrap}
  .meta{color:var(--mut);font-size:.78rem;margin-top:6px}
  .cdate{font-size:.72rem;color:var(--mut);margin-bottom:4px}
  .result{margin-top:8px;font-size:.82rem;padding-top:8px;border-top:1px solid var(--line)}
  .ok{color:var(--call)} .miss{color:#ef4444}
  .secth{font-size:.8rem;font-weight:400;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 6px}
  footer{color:var(--mut);font-size:.75rem;margin-top:20px;border-top:1px solid var(--line);padding-top:12px}
  details{margin-top:8px} summary{cursor:pointer;color:var(--mut)}
  details h3{font-size:1rem;margin:14px 0 4px;color:var(--txt)}
  .howto-hint{margin-top:9px;background:transparent;border:1px solid var(--line);color:var(--mut);font-size:12.5px;padding:4px 11px;border-radius:7px;cursor:pointer;font-family:inherit}
  .howto-hint:hover{color:var(--txt);border-color:var(--mut)}
  .empty-state{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:26px 22px;text-align:center;color:var(--mut);font-size:.95rem;line-height:1.6}
  .empty-state svg{display:block;margin:0 auto 12px}

  /* ===== unified cube (one card per game: winner on top + totals accordion + result) ===== */
  .chips{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
  .chip{min-height:44px;padding:8px 16px;border-radius:999px;border:1px solid var(--line);background:var(--card);
        color:var(--txt);font-size:.9rem;cursor:pointer;font-family:inherit}
  .chip[aria-pressed="true"]{background:#1e3a28;color:#4ade80;border-color:#2ea043;font-weight:700}
  .jump{display:inline-block;margin:2px 0 8px;color:#58a6ff;font-size:.85rem;text-decoration:none}
  .cube{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:10px 0}
  .cube.ap{border-inline-start:3px solid #f59e0b}
  .cube-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
  .cflags{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
  .cflag{font-size:.7rem;padding:2px 8px;border-radius:999px;background:#262c38;color:var(--txt)}
  .cflag.ap{background:#f59e0b;color:#0f1419;font-weight:700} .cflag.warn{background:#fbbf24;color:#0f1419}
  .cflag.lk{background:#2ea043;color:#0f1419;font-weight:700} .cflag.eo{background:#30363d;color:#8b949e}
  /* 2-segment bar (Home|Away / Over|Under) — כמו המונדיאל, טקסט-כהה על הפלחים */
  .segrow{display:flex;align-items:center;gap:8px;margin:4px 0}
  .seglbl{width:66px;font-size:.74rem;color:var(--mut)}
  .seg2{flex:1;display:flex;height:24px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .seg{display:flex;align-items:center;justify-content:center;color:#0f1419;font-size:.72rem;font-weight:700;white-space:nowrap;min-width:0;overflow:hidden}
  .seg.h{background:#4ade80} .seg.a{background:#60a5fa} .seg.o{background:#4ade80} .seg.u{background:#fbbf24}
  .axis2{display:flex;font-size:.7rem;color:var(--mut);margin:2px 0 4px}
  .axis2 span{text-align:center}
  .pickline2{margin-top:9px;font-size:.9rem;font-weight:600}
  /* שכבת-FIP: תג "מתחשב-בזורק" + שורת Elo→ */
  .fiptag{margin-top:6px;font-size:.74rem;color:#7ec9a0;background:#0d1a12;border-inline-start:3px solid #2ea043;
          padding:5px 9px;border-radius:6px;line-height:1.5}
  .fiptag .fipdelta{display:block;color:var(--mut);font-weight:400;margin-top:2px}
  /* בלוק-ערך/זון (כמו .vgap של המונדיאל), ניסוח מותאם-בייסבול */
  .zone{margin-top:9px;border-radius:8px;padding:8px 11px;font-size:.8rem;font-weight:700;line-height:1.45}
  .zone small{display:block;font-weight:500;color:var(--mut);margin-top:3px;font-size:.74rem}
  .zone.v{background:#10201a;border:1px dashed #2e7d4a;color:#7ec9a0}
  .zone.w{background:#2a1416;border:1px solid #c0473e;color:#f4a0a0}
  .zone.c{background:#0f2a2c;border:1px solid #2b8a8a;color:#6fd6cf}
  .zone.n{background:#1a1d24;border:1px solid var(--line);color:var(--mut);font-weight:500}
  .hometag{font-size:.74rem;color:var(--mut);margin-top:2px}
  /* כפתור "איך לקרוא?" → דף-ההסבר (עוגן #how-to-read). קטן, נגיש, לא-שובר-layout */
  .howbtn{display:inline-block;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--mut);
    font-size:.72rem;line-height:1.3;cursor:pointer;font-family:inherit;padding:3px 9px;white-space:nowrap}
  .howbtn:hover,.howbtn:focus-visible{color:#58a6ff;border-color:#58a6ff}
  /* תרשים-קובייה-מוסבר ב-#how-to-read */
  .gv-diagram{margin:12px 0;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0d1117}
  .dgd-title{font-size:.8rem;font-weight:700;color:var(--txt);margin-bottom:8px}
  .dgd-cube{border:1px solid var(--line);border-radius:8px;padding:10px;background:var(--card)}
  .dgd-teams{font-weight:700;font-size:.9rem;margin-bottom:6px}
  .dgd-line{display:flex;align-items:center;gap:10px;margin:6px 0;flex-wrap:wrap}
  .dgd-vis{flex:0 0 170px;display:flex;align-items:center;gap:6px}
  .dgd-cap{font-size:.66rem;color:var(--mut);flex:0 0 64px}
  .dgd-bar{flex:1;display:flex;height:18px;border-radius:5px;overflow:hidden;border:1px solid var(--line);min-width:80px}
  .dgd-seg{display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:700;color:#0f1419}
  .dgd-seg.h{background:#4ade80} .dgd-seg.a{background:#60a5fa}
  .dgd-elo{font-size:.74rem;color:#7ec9a0} .dgd-call{font-size:.78rem;font-weight:700} .dgd-val{font-size:.78rem;color:#7ec9a0;font-weight:700}
  .dgd-note{flex:1;min-width:140px;font-size:.74rem;color:var(--mut);line-height:1.4}
  .dgd-keys{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .dgd-key{flex:1;min-width:150px;font-size:.76rem;background:#10201a;border:1px dashed #2e7d4a;border-radius:7px;padding:7px 9px;color:#cfe7d8}
  .howto-list{margin:.4em 0;padding-inline-start:18px} .howto-list li{margin:.45em 0;font-size:.88rem;line-height:1.5}
  .howto-sum{font-size:.9rem;background:#13161c;border-radius:7px;padding:8px 10px;margin-top:6px}
  .gv-flash{animation:gvflash 1.6s ease-out}
  @keyframes gvflash{0%,40%{background:#1e3a28}100%{background:transparent}}
  @media (prefers-reduced-motion: reduce){.gv-flash{animation:none}}
  .kpi-caption{font-size:.76rem;color:var(--mut);line-height:1.55;margin:2px 0 8px}
  .kpi-caption b{color:#7ec9a0}
  .acc{margin-top:10px;border:1px solid var(--line);border-radius:9px;background:#13161c;overflow:hidden}
  .acc>summary{cursor:pointer;padding:10px 12px;font-weight:600;font-size:.9rem;min-height:44px;
        display:flex;align-items:center;gap:6px;list-style:none}
  .acc>summary::-webkit-details-marker{display:none}
  .acc[open]>summary{border-bottom:1px solid var(--line)}
  .acc-body{padding:10px 12px}
  .tsub{color:var(--mut);font-size:.8rem;margin-bottom:4px}
  .tsub.fb{color:#fbbf24}
  .tsub.locknote{color:#7ee2a8;background:#0d1a12;border-inline-start:3px solid #2ea043;padding:6px 9px;border-radius:6px;line-height:1.5}
  /* כל-הקווים — OVER% למנוע, הקו-הנעול מודגש */
  .ll-grid{margin:8px 0;padding:8px;border:1px solid var(--line);border-radius:8px;background:#0d1117}
  .ll-cap{font-size:.74rem;color:var(--mut);margin-bottom:6px}
  .ll-row{display:flex;align-items:center;gap:8px;margin:3px 0}
  .ll-line{flex:0 0 46px;text-align:right;font-size:.8rem;color:var(--mut)}
  .ll-bar{flex:1;height:10px;background:#21262d;border-radius:999px;overflow:hidden}
  .ll-fill{height:100%;background:#3b82f6;border-radius:999px}
  .ll-pct{flex:0 0 40px;font-size:.76rem;color:var(--mut);text-align:right}
  .ll-row.ll-lock .ll-line{color:#4ade80;font-weight:700}
  .ll-row.ll-lock .ll-fill{background:#2ea043}
  .ll-row.ll-lock .ll-pct{color:#4ade80;font-weight:700}
  .treasons{font-size:.8rem;color:var(--mut);margin-top:6px}
  .t-push{color:var(--mut)}
  .restail{margin-top:10px;font-size:.82rem;padding-top:8px;border-top:1px solid var(--line)}
  .restail.pend{color:var(--mut)}

  /* ===== shared: guide modal (worldcup pattern) · disclaimer modal · footer · back-to-top ===== */
  .gv-modal{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:200;display:none;
            overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 10px}
  .gv-modal.open{display:block}
  .gv-card{max-width:640px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .gv-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 16px;
           border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card)}
  .gv-head strong{font-size:1.05rem}
  .gv-close{min-height:44px;min-width:44px;background:transparent;border:1px solid var(--line);color:var(--txt);
            border-radius:8px;cursor:pointer;font-size:1.15rem}
  .gv-body{padding:16px}
  .gv-sec{margin:0 0 18px} .gv-ey{display:flex;align-items:center;gap:9px;margin-bottom:5px}
  .gv-num{background:#1e3a28;color:#4ade80;font-weight:800;font-size:.78rem;border-radius:6px;padding:2px 8px}
  .gv-sec h3{font-size:1rem;margin:0} .gv-sec p{margin:.35em 0;font-size:.9rem} .gv-lead{font-weight:600}
  .gv-sec ul{margin:.35em 0;padding-inline-start:20px} .gv-sec li{margin:.3em 0;font-size:.9rem}
  .gv-callout{background:#13251a;border:1px solid #1e3a28;border-radius:9px;padding:9px 12px;margin:.5em 0;font-size:.88rem}
  .gv-chip{display:inline-block;font-size:.74rem;padding:2px 9px;border-radius:999px;margin:2px 3px;color:#0f1419;font-weight:700}
  .gv-chip.v{background:#4ade80} .gv-chip.w{background:#fbbf24} .gv-chip.c{background:#60a5fa} .gv-chip.n{background:#8b949e}
  .gv-body .lgl{font-size:.86rem;line-height:1.65;color:var(--txt)} .gv-body .lgl h4{margin:14px 0 4px;font-size:.95rem}
  .gv-body .lgl a{color:#58a6ff;word-break:break-word}
  .site-footer{max-width:760px;margin:22px auto 70px;padding:12px 14px;border-top:1px solid var(--line);
               color:var(--mut);font-size:.8rem;text-align:center;line-height:1.8}
  .site-footer button{min-height:36px;background:transparent;border:1px solid var(--line);color:var(--txt);
               border-radius:7px;padding:5px 12px;cursor:pointer;font-size:.8rem;font-family:inherit;margin-inline-start:4px}
  #backTop{position:fixed;bottom:18px;left:18px;display:none;align-items:center;gap:6px;min-height:44px;padding:10px 14px;
           background:#4ade80;color:#0f1419;border:none;border-radius:999px;cursor:pointer;font-weight:700;z-index:120;font-family:inherit}
  #backTop.show{display:inline-flex}
  .gametime{font-size:.74rem;color:var(--mut)}
  /* ⭐ i18n toggle for NEW bilingual content (totals/footer/guide/disclaimer) — winner keeps JS-i18n */
  body[data-applang="en"] .l-he{display:none} body[data-applang="he"] .l-en{display:none}
  @media (prefers-reduced-motion: no-preference){ html{scroll-behavior:smooth} }
</style>
</head>
<body data-applang="en">
<header>
  <div>
    <h1 id="title">MLB Prediction Board</h1>
    <div class="sub" id="subtitle"></div>
    <button class="howto-hint" id="howtoHint" onclick="openHowto()"></button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="fresh" id="freshBanner">—</span>
    <button class="toggle" id="langToggle" aria-label="Language / שפה">עב</button>
  </div>
</header>

<h2 class="secth" id="accHead">Validated accuracy</h2>
<div class="kpis" id="kpiStrip"></div>
<p class="kpi-caption" id="kpiCaption"></p>

<nav class="chips" id="dateChips" aria-label="date / ניווט תאריך">
  <button class="chip" data-d="yesterday" aria-pressed="false"><span class="l-he">אתמול</span><span class="l-en">Yesterday</span></button>
  <button class="chip" data-d="today" aria-pressed="true"><span class="l-he">היום</span><span class="l-en">Today</span></button>
  <button class="chip" data-d="tomorrow" aria-pressed="false"><span class="l-he">מחר</span><span class="l-en">Tomorrow</span></button>
  <button class="chip" data-d="bydate" aria-pressed="false"><span class="l-he">לפי תאריך</span><span class="l-en">By date</span></button>
  <input type="date" id="datePicker" aria-label="בחר תאריך / pick date" style="display:none;min-height:44px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--txt)">
</nav>
<a class="jump" href="#cards"><span class="l-he">↓ קפוץ למשחקי-היום</span><span class="l-en">↓ Jump to today's games</span></a>

<div id="cards"></div>

<!-- shared: always-visible disclaimer footer (both tabs) -->
<footer class="site-footer" id="siteFooter">
  <span class="l-he">מידע ובידור בלבד · לא ייעוץ-הימורים · גיל 18+</span>
  <span class="l-en">For information and entertainment only · Not betting advice · 18+</span>
  <button id="disclaimerBtn" onclick="openDisclaimer()" aria-haspopup="dialog"><span class="l-he">הצהרות ופרטיות</span><span class="l-en">Disclaimer &amp; Privacy</span></button>
</footer>

<button id="backTop" aria-label="back to top / חזרה למעלה">↑ <span class="l-he">למעלה</span><span class="l-en">Top</span></button>

<!-- shared guide modal (worldcup pattern) — body set by openGuide(tab) -->
<div class="gv-modal" id="guide-modal" role="dialog" aria-modal="true" aria-labelledby="guideTitle" onclick="if(event.target===this)closeGuide()">
  <div class="gv-card">
    <div class="gv-head"><strong id="guideTitle">📖</strong>
      <button class="gv-close" onclick="closeGuide()" aria-label="close / סגור">✕</button></div>
    <div class="gv-body" id="guideBody"></div>
  </div>
</div>

<!-- shared disclaimer + privacy modal -->
<div class="gv-modal" id="disclaimer-modal" role="dialog" aria-modal="true" aria-labelledby="disclaimerTitle" onclick="if(event.target===this)closeDisclaimer()">
  <div class="gv-card">
    <div class="gv-head"><strong id="disclaimerTitle"><span class="l-he">הצהרות ופרטיות</span><span class="l-en">Disclaimer &amp; Privacy</span></strong>
      <button class="gv-close" onclick="closeDisclaimer()" aria-label="close / סגור">✕</button></div>
    <div class="gv-body" id="disclaimerBody"></div>
  </div>
</div>

}
// בר 2-פלחים (טקסט-כהה) — מחלקות .seg2/.seg.
// בר 2-פלחים (כמו המונדיאל): צד-שמאל ∝ p, צד-ימין ∝ 1-p. טקסט-כהה על הפלחים.
function segBar(label,lCls,p,lLbl,rCls,rLbl){
  const l=Math.round(p*100), r=100-l;
  return `<div class="segrow"><span class="seglbl">${label}</span>
    <div class="seg2"><div class="seg ${lCls}" style="flex:${l}">${l>16?lLbl+" "+l+"%":""}</div>`+
    `<div class="seg ${rCls}" style="flex:${r}">${r>16?rLbl+" "+r+"%":""}</div></div></div>`;}

function isAplus(g){ return g.win_verdict==="A+ קריאה" || (g.has_totals && g.tot_verdict==="aplus"); }

// בלוק-ערך/זון — ניסוח מותאם-בייסבול (לא "reliable & actionable" של המונדיאל).
function winnerZone(g){
  if(g.market_p_home==null) return "";
  const eh=(g.p_display!=null?g.p_display:g.p_home);   // FIP-מכויל (אם יש)
  const mh=g.market_p_home, side=eh>mh?g.home:g.away, gap=Math.round(Math.abs(eh-mh)*100);
  if(gap<3) return `<div class="zone n">${TT("שקול-לשוק","In line with market")} · ${TT("פער","gap")} ${gap}% — ${TT("שתיקה","silent")}</div>`;
  const aware=!!g.fip_edge;   // ⚠️ fip_edge≠0 → מתחשב-בזורק; אחרת → עיוור (הניסוח-הישן)
  if(gap<=10){
    const note=aware
      ? TT("השערה-למדידה · CLV יכריע. ✅ המנוע מתחשב-בזורק-הפותח — הפער שנותר אמין-יותר (לא עיוורון).",
           "Hypothesis to measure · CLV decides. ✅ The engine accounts for today's starter — the remaining gap is more reliable (not blindness).")
      : TT("השערה-למדידה, לא רווח-מובטח · CLV יכריע. ⚠️ במנצח פער לרוב = המנוע עיוור לזורק-הפותח של היום (שהשוק מתמחר).",
           "Hypothesis to measure, not guaranteed profit · CLV decides. ⚠️ For the winner a gap is usually the engine being blind to today's starter (which the market prices).");
    return `<div class="zone v">💚 ${TT("פער-ערך","Value gap")}: ${side} +${gap}%<small>${note}</small></div>`;
  }
  const noteBig=aware
    ? TT("פער-גדול — אך המנוע מתחשב-בזורק; ייתכן ערך-אמיתי. CLV יכריע.",
         "Large gap — but the engine accounts for the starter; may be real value. CLV decides.")
    : TT("לרוב עיוורון-זורק (Elo לא רואה את הפותח) — חשד-טעות, לא ערך.",
         "usually pitcher-blindness (Elo can't see the starter) — suspected error, not value.");
  return `<div class="zone w">🛑 ${TT("פער גדול","Large gap")}: ${side} +${gap}%<small>${noteBig}</small></div>`;
}
function totalsZone(g){
  if(g.market_p_over==null) return `<div class="zone n">${TT("אין שוק עדיין — שקיפות בלבד","No market yet — transparency only")}</div>`;
  if(g.tot_verdict==="check_tail") return `<div class="zone c">⚠️ ${TT("פער קיצוני — חשד טעות-מודל (לא A+)","Extreme gap — suspected model error (not A+)")}</div>`;
  const gap=Math.round(Math.abs(g.p_over-g.market_p_over)*100), side=g.p_over>g.market_p_over?"OVER":"UNDER";
  if(gap<3) return `<div class="zone n">${TT("שקול-לשוק","In line with market")} · ${TT("פער","gap")} ${gap}% — ${TT("שתיקה","silent")}</div>`;
  const ap=g.tot_verdict==="aplus";
  return `<div class="zone v">💚 ${ap?"A+ ":TT("פער-ערך: ","Value gap: ")}${side} +${gap}%`+
    `<small>${ap?TT("פער + cushion + מכויל · ","gap + cushion + calibrated · "):""}${TT("השערה-למדידה, לא רווח-מובטח · CLV יכריע.","hypothesis to measure, not guaranteed · CLV decides.")}</small></div>`;
}
function brier(p,outcome){ return ((p-outcome)*(p-outcome)).toFixed(2); }   // נמוך=טוב יותר

// כל 8 הקווים — OVER% לפי המנוע; הקו-הנעול מודגש (עליו ה-CLV והתוצאה).
function allLinesGrid(g){
  // ⚠️ מפתחות-היומן הם מחרוזות "7.0"/"7.5" — אסור לעגל דרך Number→String (String(7)="7"≠"7.0").
  // עובדים על זוגות [מחרוזת-מקורית, ערך-מספרי]; lookup לפי המחרוזת, תצוגה/השוואה לפי המספר.
  const pbl=g.p_over_by_line||{};
  let entries=Object.keys(pbl).map(s=>[s,Number(s)]).filter(([s,n])=>!isNaN(n));
  // קו-נעול מחוץ-לסט-המכויל (fallback) → מוסיפים אותו לרשת כדי שה-🔒 תמיד מודגש
  if(g.locked && g.p_over!=null && !entries.some(([s,n])=>Math.abs(n-g.line)<1e-9))
    entries.push([null, g.line]);
  entries.sort((a,b)=>a[1]-b[1]);
  if(entries.length<2) return "";
  const rows=entries.map(([s,k])=>{
    const v=(s===null)?g.p_over:pbl[s];
    const p=Math.round(v*100);
    const isL=(g.locked && Math.abs(k-g.line)<1e-9);
    return `<div class="ll-row${isL?' ll-lock':''}"><span class="ll-line">${isL?'🔒 ':''}${k}</span>`+
      `<div class="ll-bar"><div class="ll-fill" style="width:${p}%"></div></div>`+
      `<span class="ll-pct">${p}%</span></div>`;
  }).join("");
  return `<div class="ll-grid"><div class="ll-cap">${TT("כל הקווים — OVER לפי המנוע · 🔒 = הקו-הנעול (עליו ה-CLV והתוצאה)","All lines — engine OVER% · 🔒 = locked line (CLV & result are on it)")}</div>${rows}</div>`;
}
function clvText(clv,basis){   // clv בנקודות-הסתברות → אחוזים עם סימן. basis=close(מילולי)/t2/t1
  const pts=(clv*100);
  const b = basis==="close" ? "" : (basis ? ` (${TT("מול snapshot-אחרון","vs last snapshot")} ${basis})` : "");
  return `CLV ${pts>=0?'+':''}${pts.toFixed(1)}pts${b}`;
}

// ⭐ קובייה-מאוחדת אחת-למשחק: מנצח למעלה + אקורדיון-טוטאל (סגור) + תוצאה+✓/✗ באותה קובייה
function cubeHTML(g){
  const dt = fmtGameDateTime(g.game_datetime, g.date);
  // flags
  let flags="";
  if(g.win_verdict==="A+ קריאה") flags+=`<span class="cflag ap">⚾ A+</span>`;
  // 📊 A+ של הטוטאל מוצג בתקציר-האקורדיון (גלוי גם סגור) — לא מכפילים אותו בדגל-העליון.
  if(g.pitcher_changed) flags+=`<span class="cflag warn">${TT("זורק הוחלף","pitcher changed")}</span>`;
  // 🏆 winner (top): engine vs market, 2 צדדים (P(בית)), אין תיקו
  let win="";
  if(g.has_winner && g.p_home!=null){
    const pdisp=(g.p_display!=null?g.p_display:g.p_home);   // בר-מנוע = p_display (FIP-מכויל)
    const ph=Math.round(pdisp*100);
    win+=segBar(TT("מנוע","Engine"),"h",pdisp,TT("בית","H"),"a",TT("חוץ","A"));    // "מה שווה" (מכויל-זורק)
    if(g.market_p_home!=null) win+=segBar(TT("שוק","Market"),"h",g.market_p_home,TT("בית","H"),"a",TT("חוץ","A"));  // "מה עולה" (הפער מוצג בבלוק-הערך)
    win+=`<div class="axis2"><span style="flex:${ph}">${g.home}</span><span style="flex:${100-ph}">${g.away}</span></div>`;
    // שכבת-FIP: שורת-שקיפות Elo→ + תג מתחשב-בזורק (רק כש-fip_edge≠0)
    if(g.fip_edge && g.p_home!=null){
      const eloP=Math.round(g.p_home*100), dispP=Math.round(pdisp*100);
      const fa=(g.fip_away!=null?` FIP ${g.fip_away.toFixed(2)}`:""), fh=(g.fip_home!=null?` FIP ${g.fip_home.toFixed(2)}`:"");
      win+=`<div class="fiptag">⚾ ${TT("מתחשב-בזורק","starter-aware")}: ${g.away_pitcher||g.away}${fa} · ${g.home_pitcher||g.home}${fh}`+
           `<span class="fipdelta">Elo ${eloP}% → ${dispP}%</span></div>`;
    }
    const conf=Math.round((parseFloat(g.conf)||0)*100);
    const silent = g.win_verdict!=="A+ קריאה";
    win+=`<div class="pickline2">🏆 ${TT("קריאה","Call")}: <b>${g.pick}</b> · ${conf}% · ${TT("שלב","stage")} ${g.pick_stage}`+
         (silent?` · <span class="silent-tag">${TT("צמוד — שתיקה","too close — silent")}</span>`:"")+`</div>`;
    win+=winnerZone(g);   // #4 בלוק-ערך (FIP-aware)
  }
  // 📊 totals accordion (closed by default) — הקו-הנעול מודגש + כל-8-הקווים
  let tot="";
  if(g.has_totals && g.p_over!=null){
    const line=g.line;
    // בר-מנוע מציג p_over מותאם-FIP על הקו-הנעול (אם tot_fip_edge≠0); אחרת engine p_over. ⚠️ verdict/CLV על engine.
    const fipTot=(g.tot_fip_edge && g.p_over_fip!=null);
    const povD=fipTot?g.p_over_fip:g.p_over;
    let tb=segBar(TT("מנוע","Engine"),"o",povD,"OVER","u","UNDER");
    if(g.market_p_over!=null) tb+=segBar(TT("שוק","Market"),"o",g.market_p_over,"OVER","u","UNDER");
    tb+=`<div class="axis2"><span style="flex:${Math.round(povD*100)}">OVER ${line}</span><span style="flex:${100-Math.round(povD*100)}">UNDER</span></div>`;
    if(fipTot){const eo=Math.round(g.p_over*100), fo=Math.round(povD*100);
      tb+=`<div class="fiptag">⚾ ${TT("מתחשב-בזורק (טוטאל)","starter-aware (total)")}`+
          `<span class="fipdelta">engine OVER ${eo}% → ${fo}% · ${TT("אות-זורק על הטוטאל חלש (בתוך-מדידה) — CLV יאמת","totals starter signal is weak (within measurement) — CLV will confirm")}</span></div>`;}
    const rs=(g.reasons||[]).map(r=>{const t=reasonText(r);return t?`<div>• ${t}</div>`:"";}).join("");
    const tap=g.tot_verdict==="aplus"?` <span class="cflag ap">📊 A+</span>`:"";   // 📊 = טוטאל-A+ (לא מנצח)
    // הסבר-נעילה (שפה-פשוטה) — tooltip על ה-🔒 + הערה בגוף-האקורדיון
    const LOCK_TIP = TT("קו-הטוטאל ננעל בניבוי-הראשון ולא-משתנה — כדי שהפער, ה-CLV והתוצאה יימדדו כולם על קו-יציב אחד, גם אם השוק מזיז את הקו אחר-כך.",
                        "The total line is locked at our first prediction and never changes — so the gap, CLV, and result are all measured on one stable line, even if the market moves it later.");
    // תווית-קו: נעול 🔒 / קירוב-כיול (fallback) / engine-only (טרם-ננעל)
    const lockTag = g.locked
      ? (g.line_source==="market_fallback"
          ? ` <span class="cflag warn" title="${LOCK_TIP}">🔒 ${TT("קו-נעול · קירוב-כיול","locked · calib-approx")}</span>`
          : ` <span class="cflag lk" title="${LOCK_TIP}">🔒 ${TT("קו-נעול","locked")}</span>`)
      : ` <span class="cflag eo">${TT("engine-only · טרם-ננעל","engine-only · not locked")}</span>`;
    const lockNote = g.locked
      ? `<div class="tsub locknote">🔒 ${LOCK_TIP}</div>` : "";
    const fbNote = (g.locked && g.line_source==="market_fallback")
      ? `<div class="tsub fb">⚠️ ${TT("הקו מחוץ-לסט-המכויל — p_over דרך Platt של הקו-הקרוב (קירוב).","Line outside the calibrated set — p_over via nearest-line Platt (approx).")}</div>` : "";
    tot=`<details class="acc"><summary>📊 ${TT("טוטאל ריצות","Total runs")} · ${TT("קו","line")} ${line}${lockTag}${tap}</summary>
      <div class="acc-body"><div class="tsub">λ = ${g.lambda_total} ${TT("ריצות","runs")} · park ×${g.park_factor}${g.park_uncertain?" ⚠️":""}</div>
      ${lockNote}${fbNote}${tb}${totalsZone(g)}${allLinesGrid(g)}<div class="treasons">${rs}</div></div></details>`;
  }
  // result tail (same cube)
  let tail="";
  if(g.played){
    let parts=[];
    if(g.win_correct==="1") parts.push(`🏆 <span class="ok">✓ ${TT("מנצח","winner")}</span>`);
    else if(g.win_correct==="0") parts.push(`🏆 <span class="miss">✗ ${TT("מנצח","winner")}</span>`);
    if(g.tot_correct==="1") parts.push(`📊 <span class="ok">✓ ${TT("טוטאל","total")}</span>`);
    else if(g.tot_correct==="0") parts.push(`📊 <span class="miss">✗ ${TT("טוטאל","total")}</span>`);
    else if(g.tot_correct==="push") parts.push(`📊 <span class="t-push">push</span>`);
    // #5 Match-Brier (נמוך=טוב) — מנצח: brier(p_display, home-won) [עקבי עם הבר המוצג] · טוטאל: brier(p_over, over).
    let metrics=[];
    if(g.has_winner && g.p_home!=null){ const hw=(g.home_score>g.away_score)?1:0; const bp=(g.p_display!=null?g.p_display:g.p_home); metrics.push(`🏆 ${brier(bp,hw)}`); }
    if(g.has_totals && g.p_over!=null && g.tot_correct!=="push" && g.line!=null){
      const ov=(g.total_actual> g.line)?1:0; const pb=(g.p_over_fip!=null?g.p_over_fip:g.p_over); metrics.push(`📊 ${brier(pb,ov)}`); }
    const brierLine = metrics.length ? `<div class="tsub">${TT("Brier","Brier")} ${metrics.join(" · ")} (${TT("נמוך=טוב","lower=better")})${g.clv!=null?` · ${clvText(g.clv,g.clv_basis)}`:""}</div>` : "";
    tail=`<div class="restail">${TT("תוצאה","Final")}: ${g.away} ${g.away_score}–${g.home_score} ${g.home}`+
         (g.total_actual!=null?` (${TT("סך","total")} ${g.total_actual})`:"")+(parts.length?` · ${parts.join(" · ")}`:"")+brierLine+`</div>`;
  } else {
    tail=`<div class="restail pend">${TT("טרם שוחק","Not played yet")}</div>`;
  }
  return `<div class="cube${isAplus(g)?" ap":""}">
    <div class="cube-head"><div><div class="teams">${g.away} @ ${g.home}</div>
      <div class="hometag">${TT("בית","Home")}: <b>${g.home}</b> · ${TT("חוץ","Away")}: <b>${g.away}</b></div>
      <div class="cdate">${dt||""}</div></div><div class="cflags">${flags}<button class="howbtn" type="button" onclick="openGuideAt('how-to-read')" aria-label="${TT('איך לקרוא קובייה','How to read a cube')}">${TT('❓ איך לקרוא?','❓ How to read?')}</button></div></div>
    ${win}${tot}${tail}</div>`;
}

function render(){
  const L = I18N[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang==="he") ? "rtl" : "ltr";
  document.getElementById("title").textContent = L.title;
  document.getElementById("subtitle").textContent = TT("שני מנועים, קובייה אחת לכל משחק: מנצח + טוטאל-ריצות (over/under).","Two engines, one card per game: winner + total runs (over/under).");
  document.getElementById("langToggle").textContent = (lang==="en") ? "עב" : "EN";
  document.getElementById("howtoHint").textContent = L.howtoHint;

  const fb = document.getElementById("freshBanner");
  if(FRESH.status==="stale"){ fb.className="fresh stale"; fb.textContent = L.stale + FRESH.updated; }
  else { fb.className="fresh"; fb.textContent = L.fresh + FRESH.updated; }

  // KPI: 5 קוביות — A+ מנצח · שלב · כללי · דיוק-טוטאל O/U · CLV-מצטבר (מהיומן)
  const A = ACCURACY;
  document.getElementById("accHead").textContent = L.accHead;
  const ou = (typeof TLOG!=="undefined" && TLOG.ou_total) ? Math.round(TLOG.ou_correct/TLOG.ou_total*100)+"%" : "—";
  const ouSub = TT("דיוק over/under של מנוע-הטוטאל (כיוון גולמי; ~50% תקין בשוק יעיל)","Totals engine over/under direction (raw; ~50% healthy)")
    + (typeof TLOG!=="undefined" && TLOG.ou_total ? ` · ${TLOG.ou_correct}/${TLOG.ou_total}` : "");
  // CLV-מצטבר: ⚠️ forward-only — 0 משחקים-עם-clv → "collecting" (לא NaN/שבור)
  const clvN = (typeof CLV_SUMMARY!=="undefined") ? (CLV_SUMMARY.n||0) : 0;
  const clvCube = (clvN>0)
    ? {n:`${CLV_SUMMARY.avg_pts>=0?"+":""}${CLV_SUMMARY.avg_pts}`, u:"pts",
       l:TT(`CLV מצטבר של מנוע-הטוטאל על ${clvN} משחקים שנסגרו (${CLV_SUMMARY.positive} חיוביים) · נטול-וויג, מול קו-הסגירה. >0 = המנוע הקדים את תנועת-השוק.`,
            `Cumulative totals CLV over ${clvN} closed games (${CLV_SUMMARY.positive} positive) · no-vig, vs the closing line. >0 = engine beat the market's move.`)}
    : {n:TT("צובר","collecting"), u:"",
       l:TT("CLV-מצטבר ייאסף קדימה — אין עדיין משחקים-עם-קו-סגירה שנסגרו (0 staked). זה תקין: היומן חדש.",
            "Cumulative CLV accrues forward — no closed games with a closing line yet (0 staked). Healthy: the journal is new.")};
  const cubes = [
    {n:A.aplus,  u:"%", l:L.kAplus.replace("{v}",A.aplus).replace("{pct}",A.aplus_pct)},
    {n:A.stage,  u:"%", l:L.kStage.replace("{v}",A.stage)},
    {n:A.overall,u:"%", l:L.kOverall.replace("{v}",A.overall).replace("{base}",A.base)},
    {n:ou,       u:"",  l:ouSub},
    clvCube,
  ];
  document.getElementById("kpiStrip").innerHTML =
    cubes.map(c=>`<div class="kpi"><div class="n">${c.n}<small>${c.u}</small></div><div class="l">${c.l}</div></div>`).join("");
  // #6 כיתוב-הסבר: מה הקוביות מודדות + מהו ערך/CLV
  document.getElementById("kpiCaption").innerHTML = TT(
    "הקוביות = דיוק-holdout מאומת (מנצח: A+ / שלב / כללי) + דיוק-כיוון של מנוע-הטוטאל. <b>ערך/CLV</b> (פער מול-השוק) הוא <b>השערה-למדידה, לא רווח-מובטח</b> — מופיע כבלוק-ירוק בכרטיס; CLV-מצטבר יוכרע קדימה כשייאסף שוק.",
    "Cubes = validated holdout accuracy (winner: A+ / stage / overall) + the totals engine's direction. <b>Value/CLV</b> (gap vs market) is a <b>hypothesis to measure, not guaranteed profit</b> — shown as a green block per card; cumulative CLV is decided forward as market accrues.");

  // date chips
  document.querySelectorAll("#dateChips .chip").forEach(c=>c.setAttribute("aria-pressed", c.dataset.d===view));

  // unified cubes — מסננים את חלון-3-הימים לפי-התאריך-הנבחר (היומן מתמלא forward-only)
  const cards = document.getElementById("cards");
  // בורר-תאריך גלוי רק במצב "לפי תאריך"
  document.getElementById("datePicker").style.display = (view==="bydate") ? "inline-block" : "none";
  const sel = dateForView();
  if(view==="bydate" && !sel){
    cards.innerHTML = `<div class="empty-state">${TT("בחר תאריך מהבורר למעלה","Pick a date from the selector above")}</div>`;
    return;
  }
  const dayGames = GAMES.filter(g=>g.date===sel);
  if(!dayGames.length){
    cards.innerHTML = `<div class="empty-state">${
      view==="tomorrow" ? TT("ניבויי-מחר יופיעו ברענון-הבוקר","Tomorrow's calls appear at the morning refresh")
      : view==="yesterday" ? TT("תוצאות-אתמול נצברות לאורך העונה (היומן נצבר קדימה)","Yesterday's results accrue over the season (journal fills forward)")
      : view==="bydate" ? TT(`אין משחקים ביומן לתאריך ${fmtDate(sel)}`,`No games in the journal for ${fmtDate(sel)}`)
      : quietText(L)}</div>`;
    return;
  }
  const sorted = [...dayGames].sort((a,b)=>(isAplus(b)?1:0)-(isAplus(a)?1:0));   // A+ צף למעלה
  cards.innerHTML = sorted.map(cubeHTML).join("");
}

let byDate = "";   // תאריך-נבחר במצב bydate
function dateForView(){
  if(view==="bydate") return byDate;
  if(!TODAY_DATE) return "";
  const off = view==="yesterday" ? -1 : view==="tomorrow" ? 1 : 0;
  const d = new Date(TODAY_DATE+"T12:00:00Z");
  d.setUTCDate(d.getUTCDate()+off);
  return d.toISOString().slice(0,10);
}
// אתחול-בורר: טווח min/max מהתאריכים-הקיימים ב-GAMES (היומן)
function initDatePicker(){
  const dates = [...new Set(GAMES.map(g=>g.date))].filter(Boolean).sort();
  const dp = document.getElementById("datePicker");
  if(dates.length){ dp.min = dates[0]; dp.max = dates[dates.length-1]; }
  dp.addEventListener("change", ()=>{ byDate = dp.value; view = "bydate"; render(); });
}

// localized start time (browser TZ): he 24h, en 12h. "" if unknown.
function fmtGameTime(iso){
  if(!iso) return "";
  const d = new Date(iso); if(isNaN(d)) return "";
  try{ return new Intl.DateTimeFormat(lang==="he"?"he-IL":"en-US",
        {hour:"numeric",minute:"2-digit",hour12:(lang!=="he")}).format(d); }
  catch(e){ return ""; }
}
function fmtGameDateTime(iso, fallbackDate){
  const d = iso ? new Date(iso) : null;
  let dpart="";
  if(d && !isNaN(d)){ try{ dpart=new Intl.DateTimeFormat(lang==="he"?"he-IL":"en-US",
        {month:"short",day:"numeric"}).format(d); }catch(e){} }
  if(!dpart) dpart = fallbackDate ? fmtDate(fallbackDate) : "";
  const t = fmtGameTime(iso);
  return t ? `${dpart} · ${t}` : dpart;
}

    <li><span class="l-he"><b>הקריאה</b> (למשל TEX 54%): על ה-Elo הגולמי, לא על המכויל — בכוונה. בבדיקות: FIP משפר את דיוק-ההסתברות אבל לא את דיוק-הבחירה. לכן <b>Elo בוחר מי-ינצח, FIP מכייל כמה-בטוח</b> — כל אחד במה שהוא הכי-טוב בו.</span><span class="l-en"><b>The Call</b> (e.g. TEX 54%): on raw Elo, not the calibrated number — intentional. Testing showed FIP improves probability accuracy but not pick accuracy. So <b>Elo picks the winner, FIP calibrates confidence</b> — each on what it is best at.</span></li>
    <li><span class="l-he"><b>בלוק-הערך</b> (למשל +3%): הפער בין המנוע-המכויל (50%) לשוק (47%). ⚠️ נקודות-אחוז, לא "3% רווח". מחושב על המכויל. השערה-למדידה, CLV מכריע.</span><span class="l-en"><b>Value block</b> (e.g. +3%): the gap between the calibrated engine (50%) and the market (47%). ⚠️ percentage points, not "3% profit". Computed on the calibrated number. A hypothesis to measure — CLV decides.</span></li>
    <li><span class="l-he"><b>הקו-הנעול 🔒:</b> קו-הטוטאל ננעל בניבוי-ראשון ונשאר קבוע. תצוגה + CLV + תוצאה — על אותו קו.</span><span class="l-en"><b>Locked line 🔒:</b> the totals line locks at the first prediction and stays fixed. Display + CLV + result — all on the same line.</span></li>
  </ul>
  <p class="howto-sum"><span class="l-he"><b>לסיכום:</b> הקריאה על Elo-הגולמי, הפער על המנוע-המכויל. כל אחד על המספר שהוא הכי-טוב בו.</span><span class="l-en"><b>In short:</b> the Call is on raw Elo; the value gap is on the calibrated engine. Each on the number it is best at.</span></p></div>`;
