<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB A+ Prediction Engine</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --txt:#e8eaed; --mut:#9aa0aa;
    --call:#2ea043; --accent:#2ea043; --warn:#e0b070;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;padding:16px;max-width:760px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  h1{font-size:1.4rem;margin:.2em 0}
  .sub{color:var(--mut);font-size:.85rem}
  .fresh{font-size:.8rem;padding:4px 10px;border-radius:6px;background:#13251a;border:1px solid #1e3a28}
  .fresh.stale{background:#2a1e13;border-color:#3a2a1e;color:var(--warn)}
  .toggle{cursor:pointer;background:var(--card);border:1px solid var(--line);color:var(--txt);
    border-radius:6px;padding:6px 12px;font-size:.85rem}
  .banner{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px;margin:14px 0;text-align:center}
  .track{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:14px 0}
  .track .big{font-size:1.8rem;font-weight:700;color:var(--accent)}
  .track .n{color:var(--mut);font-size:.85rem}
  .call{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0;
    border-inline-start:3px solid var(--call)}
  .ctop{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .teams{font-weight:600}
  .pick{font-size:.8rem;padding:3px 9px;border-radius:20px;background:#13251a;color:#4ade80;border:1px solid #1e3a28;white-space:nowrap}
  .meta{color:var(--mut);font-size:.78rem;margin-top:6px}
  .cdate{font-size:.72rem;color:var(--mut);margin-bottom:4px}
  .result{margin-top:8px;font-size:.82rem;padding-top:8px;border-top:1px solid var(--line)}
  .ok{color:var(--call)} .miss{color:#ef4444}
  .secth{font-size:.8rem;font-weight:400;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 6px}
  footer{color:var(--mut);font-size:.75rem;margin-top:20px;border-top:1px solid var(--line);padding-top:12px}
  details{margin-top:8px} summary{cursor:pointer;color:var(--mut)}
  details h3{font-size:1rem;margin:14px 0 4px;color:var(--txt)}
  .howto-hint{margin-top:9px;background:transparent;border:1px solid var(--line);color:var(--mut);font-size:12.5px;padding:4px 11px;border-radius:7px;cursor:pointer;font-family:inherit}
  .howto-hint:hover{color:var(--txt);border-color:var(--mut)}
  .empty-state{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:26px 22px;text-align:center;color:var(--mut);font-size:.95rem;line-height:1.6}
  .empty-state svg{display:block;margin:0 auto 12px}
</style>
</head>
<body>
<header>
  <div>
    <h1 id="title">MLB A+ Prediction Engine</h1>
    <div class="sub" id="subtitle">Elo + stage discipline · speaks only on A+ setups (~5% of games)</div>
    <button class="howto-hint" id="howtoHint" onclick="openHowto()"></button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="fresh" id="freshBanner">Last updated: —</span>
    <button class="toggle" id="langToggle">עב</button>
  </div>
</header>

<div class="banner" id="banner"></div>
<div class="track" id="trackPanel"></div>

<h2 class="secth" id="todayHead">Today's A+ calls</h2>
<div id="todayCalls" role="status"></div>

<h2 class="secth" id="recentHead">Recently decided</h2>
<div id="recentCalls" role="status"></div>

<footer>
  <details id="howto">
    <summary id="howTitle">How to read this page</summary>
    <h3 id="howaTitle"></h3><p id="howaText"></p>
    <h3 id="howbTitle"></h3><p id="howbText"></p>
    <h3 id="howcTitle" style="color:var(--warn)"></h3><p id="howcText"></p>
  </details>
</footer>

<script>
// ====== injected by baseball_dashboard.py ======
const FRESH = {"status": "ok", "updated": "2026-06-11 20:01"}; // FRESH_LINE
const TODAY = []; // TODAY_LINE
const RECENT = []; // RECENT_LINE
const TRACK = {"decided": 0, "correct": 0, "pending": 0}; // TRACK_LINE
const TODAY_DATE = "2026-06-11"; // DATE_LINE
const SCANNED = 8; // SCANNED_LINE
// ================================================

const I18N = {
  en:{title:"MLB A+ Prediction Engine",
      subtitle:"Elo + stage discipline · speaks only on A+ setups (~5% of games)",
      fresh:"Last updated: ", stale:"⚠ Update failed — data from ",
      trackTitle:"Live track record (decided A+ calls)", of:" of ",
      pending:" awaiting result", noTrack:"No A+ calls decided yet — record builds over the season.",
      todayHead:"Today's A+ calls", recentHead:"Recently decided",
      quiet:"No A+ calls today — the engine is silent. That's the discipline: it speaks on ~5% of games.",
      noRecent:"Nothing decided yet.",
      pick:"pick", conf:"confidence", stage:"stage",
      result:"Result: ", correct:"✓ correct", wrong:"✗ missed",
      howtoHint:"New here? How to read this page →",
      howTitle:"How to read this page",
      howaTitle:"What this page shows",
      howaText:"This page doesn't show every game today — only the ones the engine is genuinely confident about. At the single-game level, baseball is one of the most random of the major sports — a given game sits close to a coin flip. As the saying goes, even a great team loses about a third of its games and a poor team wins about a third; it's the other third that decides a season. So most matchups don't have a clear edge for anyone. Instead of forcing a call on a near-even game, the engine stays silent and speaks only when it has a strong read. A quiet day means the engine didn't find a call worth making — not that nothing was checked.",
      howbTitle:"Confidence and A+",
      howbText:"When the engine does make a call, it shows its pick and a confidence number — how likely it thinks the pick is to win. Baseball has no draw, so it's just two outcomes: this team or the other. \"A+\" is the bar a game must clear to appear at all: the engine's strongest stages, with confidence of at least 62%. Only about 1 game in 20 clears it. Confidence is not certainty — a 62% call still loses nearly 4 times in 10. That's the nature of baseball, and it's exactly why the engine stays quiet unless the edge is real. The track record panel fills in over the season, so you can watch how the calls actually do.",
      howcTitle:"The caveat",
      howcText:"The picks are an edge in reading the game, not a promise. Even a confident call loses sometimes — that's baseball, where randomness runs high. The engine was tested against historical results and naive logic, not against bookmaker lines, so a good track record here means it reads the game well — not that it beats the market or guarantees easy money."},
  he:{title:"מנוע חיזוי MLB — קריאות A+",
      subtitle:"Elo + משמעת שלבים · מדבר רק על סטאפ A+ (~5% מהמשחקים)",
      fresh:"עודכן לאחרונה: ", stale:"⚠ העדכון נכשל — נתונים מ-",
      trackTitle:"Track record חי (קריאות A+ שהוכרעו)", of:" מתוך ",
      pending:" ממתינות לתוצאה", noTrack:"עדיין אין קריאות A+ שהוכרעו — הרשומה נבנית לאורך העונה.",
      todayHead:"קריאות A+ של היום", recentHead:"הוכרעו לאחרונה",
      quiet:"אין קריאות A+ היום — המנוע שותק. זו המשמעת: הוא מדבר על ~5% מהמשחקים.",
      noRecent:"עדיין לא הוכרע דבר.",
      pick:"בחירה", conf:"ביטחון", stage:"שלב",
      result:"תוצאה: ", correct:"✓ צדקה", wrong:"✗ פספסה",
      howtoHint:"חדש כאן? איך לקרוא את הדף ←",
      howTitle:"איך לקרוא את הדף",
      howaTitle:"מה הדף מראה",
      howaText:"הדף הזה לא מציג את כל המשחקים של היום — רק את אלה שהמנוע באמת בטוח לגביהם. ברמת המשחק הבודד, בייסבול הוא מהאקראיים בספורט — משחק בודד קרוב להטלת מטבע. כמו שאומרים, אפילו קבוצה מצוינת מפסידה בערך שליש מהמשחקים, וקבוצה חלשה מנצחת בערך שליש; השליש האחר הוא שקובע עונה. אז ברוב המשחקים אין לאף צד יתרון ברור. במקום לכפות קריאה על משחק כמעט-שווה, המנוע שותק ומדבר רק כשיש לו קריאה חזקה. יום שקט אומר שהמנוע לא מצא קריאה ששווה לעשות — לא שכלום לא נבדק.",
      howbTitle:"ביטחון ו-A+",
      howbText:"כשהמנוע כן עושה קריאה, הוא מציג את הבחירה שלו ומספר ביטחון — כמה הוא מעריך שהבחירה תנצח. בבייסבול אין תיקו, אז יש רק שתי תוצאות: הקבוצה הזו או השנייה. \"A+\" הוא הרף שמשחק חייב לעבור כדי להופיע בכלל: השלבים החזקים של המנוע, עם ביטחון של 62% לפחות. רק בערך משחק אחד מתוך 20 עובר אותו. ביטחון הוא לא ודאות — קריאה של 62% עדיין מפסידה כמעט 4 פעמים מתוך 10. זה האופי של בייסבול, וזו בדיוק הסיבה שהמנוע שותק אלא אם היתרון אמיתי. פאנל ה-track record מתמלא לאורך העונה, כך שאפשר לראות איך הקריאות באמת מתפקדות.",
      howcTitle:"הסייג",
      howcText:"הקריאות הן יתרון בקריאת המשחק, לא הבטחה. גם קריאה בטוחה מפסידה לפעמים — זה בייסבול, שבו האקראיות גבוהה. המנוע נבדק מול תוצאות היסטוריות והיגיון נאיבי, לא מול קווי מהמרים — אז track record טוב כאן אומר שהוא קורא את המשחק היטב, לא שהוא מנצח את השוק או מבטיח כסף קל."}
};

let lang = "en";
function pct(x){return Math.round(x*100)+"%"}
function fmtDate(s){ const p=String(s).split("-"); if(p.length!==3) return s;
  return (lang==="he") ? p[2]+"."+p[1] : p[1]+"."+p[2]; }   // he DD.MM · en MM.DD

function quietText(L){
  if(SCANNED != null){
    return (lang==="he")
      ? `נסרקו ${SCANNED} משחקים היום · 0 עברו את סף ה-A+ (שלב 8/9 + ביטחון ≥62%). המנוע שותק — זו המשמעת.`
      : `Scanned ${SCANNED} games today · 0 met the A+ bar (stage 8-9 + ≥62% confidence). The engine is silent — that's the discipline.`;
  }
  return L.quiet;
}

function callCard(c, L, showDate){
  let resultHtml = "";
  if(c.result){
    const cls = c.correct==="1" ? "ok" : "miss";
    const label = c.correct==="1" ? L.correct : L.wrong;
    resultHtml = `<div class="result"><span class="${cls}">${L.result}${c.result} ${label}</span></div>`;
  }
  const dateRow = showDate ? `<div class="cdate">${fmtDate(c.date)}</div>` : "";
  return `<div class="call">
    ${dateRow}
    <div class="ctop">
      <span class="teams">${c.away} @ ${c.home}</span>
      <span class="pick">${c.pick} ${pct(c.conf)}</span>
    </div>
    <div class="meta">${L.conf}: ${pct(c.conf)} · ${L.stage} ${c.pick_stage}</div>
    ${resultHtml}
  </div>`;
}

function render(){
  const L = I18N[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang==="he") ? "rtl" : "ltr";
  document.getElementById("title").textContent = L.title;
  document.getElementById("subtitle").textContent = L.subtitle;
  document.getElementById("langToggle").textContent = (lang==="en") ? "עב" : "EN";
  document.getElementById("todayHead").textContent = L.todayHead;
  document.getElementById("recentHead").textContent = L.recentHead;
  document.getElementById("howTitle").textContent = L.howTitle;
  document.getElementById("howaTitle").textContent = L.howaTitle;
  document.getElementById("howaText").textContent = L.howaText;
  document.getElementById("howbTitle").textContent = L.howbTitle;
  document.getElementById("howbText").textContent = L.howbText;
  document.getElementById("howcTitle").textContent = L.howcTitle;
  document.getElementById("howcText").textContent = L.howcText;
  document.getElementById("howtoHint").textContent = L.howtoHint;

  const fb = document.getElementById("freshBanner");
  if(FRESH.status==="stale"){ fb.className="fresh stale"; fb.textContent = L.stale + FRESH.updated; }
  else { fb.className="fresh"; fb.textContent = L.fresh + FRESH.updated; }

  document.getElementById("banner").textContent =
    TODAY_DATE ? `${fmtDate(TODAY_DATE)}` : "";
  if(TODAY.length) document.getElementById("banner").style.display="none";
  else document.getElementById("banner").style.display="block";

  const tp = document.getElementById("trackPanel");
  if(TRACK.decided>0){
    const acc = Math.round(TRACK.correct/TRACK.decided*100);
    tp.innerHTML = `<div>${L.trackTitle}</div><div class="big">${acc}%</div>
      <div class="n">${TRACK.correct}${L.of}${TRACK.decided} · ${TRACK.pending}${L.pending}</div>`;
  } else {
    tp.innerHTML = `<div>${L.trackTitle}</div><div class="n">${L.noTrack}</div>`;
  }

  const tc = document.getElementById("todayCalls");
  tc.innerHTML = TODAY.length ? TODAY.map(c=>callCard(c,L)).join("") : `<div class="empty-state"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--mut)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>${quietText(L)}</div>`;

  const rc = document.getElementById("recentCalls");
  rc.innerHTML = RECENT.length ? RECENT.map(c=>callCard(c,L,true)).join("") : `<div class="meta">${L.noRecent}</div>`;
}

function openHowto(){
  var d = document.getElementById("howto");
  if(d){ d.open = true; d.scrollIntoView({behavior:"smooth", block:"start"}); }
}

document.getElementById("langToggle").addEventListener("click",()=>{
  lang = (lang==="en") ? "he" : "en"; render();
});
render();
</script>
</body>
</html>
